name: Deploy Site - Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_run:
    workflows:
      - "Blog Auto - Publication"
      - "Actu Décrypte - Daily"
      - "Actu Récap - Dimanche"
      - "Rebuild Guard - Daily"
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    # Runners VPS STACK-2026 instables (fail au "Set up job", racine infra). Deploy
    # est critique pour la visibilite, on le fait tourner sur ubuntu-latest hosted.
    # Quota impact : ~2-3 min/deploy x 4 deploys/jour = ~360 min/mois, OK dans 2000.
    # Les workflows lourds (actu-watch, actu-recap) restent self-hosted.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Build Astro site
        working-directory: site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: pages deploy dist --project-name=adapte-toi-site --branch=main --commit-dirty=true

      - name: Alert on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python blog-auto/alert_cron_failure.py "${{ github.workflow }}" "${{ github.run_id }}"
