name: Actu Décrypte - Daily

on:
  schedule:
    # 3 creneaux lun-sam pour atteindre ~3 decryptages/jour :
    # - 04h37 UTC (06h37 Paris CEST) + sleep 0-90min -> matin 06h37-08h07
    # - 10h37 UTC (12h37 Paris CEST) + sleep 0-90min -> midi 12h37-14h07
    # - 16h37 UTC (18h37 Paris CEST) + sleep 0-90min -> soir 18h37-20h07
    # Chaque run genere 1 article max (garde le flux editorial regulier).
    # Dimanche gere par le workflow actu-recap (recap hebdo).
    - cron: '37 4 * * 1-6'
    - cron: '37 10 * * 1-6'
    - cron: '37 16 * * 1-6'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (pas de commit)'
        type: boolean
        default: false
      max:
        description: 'Nombre max d articles'
        type: string
        default: '1'
      engine:
        description: "Moteur (mistral = Mistral+Claude-audit, claude = Claude-only fallback)"
        type: choice
        default: mistral
        options:
          - mistral
          - claude
      strict:
        description: 'Strict mode (abort si audit MAJOR final, Mistral only)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  watch:
    runs-on: self-hosted
    # Random delay up to 90min + fetch RSS + Mistral scoring 40 items + Mistral draft +
    # Claude audit + Mistral fix + Claude re-audit + Mistral trim + post-process + git push
    # -> ~95min worst case, on met 120 pour la marge.
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "Adapte-toi Décrypte"
          git config user.email "decrypte@adapte-toi.com"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r blog-auto/requirements.txt

      - name: Random delay (avoid cron hour signal)
        run: |
          SLEEP=$((RANDOM % 5400))
          echo "Sleeping ${SLEEP}s before run"
          sleep $SLEEP

      - name: Run actu_watch (Mistral by default, Claude fallback)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          BING_URL_SUBMISSION_KEY: ${{ secrets.BING_URL_SUBMISSION_KEY }}
          SITE_URL: https://adapte-toi.com
        run: |
          cd blog-auto
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ github.event.inputs.strict }}" = "true" ]; then ARGS="$ARGS --strict"; fi
          MAX_N="${{ github.event.inputs.max }}"
          if [ -z "$MAX_N" ]; then MAX_N=1; fi
          ENGINE="${{ github.event.inputs.engine }}"
          # Default to mistral on scheduled runs (empty inputs)
          if [ -z "$ENGINE" ]; then ENGINE=mistral; fi
          if [ "$ENGINE" = "claude" ]; then
            echo ">> Using Claude-only fallback (actu_watch.py)"
            python actu_watch.py --max $MAX_N $ARGS
          else
            echo ">> Using Mistral + Claude-audit (actu_watch_mistral.py)"
            python actu_watch_mistral.py --max $MAX_N $ARGS
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: actu-watch-logs
          path: blog-auto/logs/
          retention-days: 30
