name: Rebuild Guard - Daily

on:
  schedule:
    # Every day at 5:00 UTC (7:00 AM Paris CEST)
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "Adapte-toi Rebuild Guard"
          git config user.email "rebuild@adapte-toi.com"

      - name: Touch marker file
        run: |
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > site/public/.rebuild-marker
          git add site/public/.rebuild-marker
          git diff --cached --quiet || git commit -m "rebuild: daily guard $(date -u +%Y-%m-%d)"
          git push origin main

      - name: Alert on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python blog-auto/alert_cron_failure.py "${{ github.workflow }}" "${{ github.run_id }}"
