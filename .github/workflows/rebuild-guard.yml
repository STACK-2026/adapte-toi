name: Rebuild Guard - Daily

on:
  schedule:
    # Every day at 5:00 UTC (7:00 AM Paris CEST)
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "Adapte-toi Rebuild Guard"
          git config user.email "rebuild@adapte-toi.com"

      - name: Commit and push rebuild marker
        run: |
          git config user.name "Adapte-toi Rebuild Guard"
          git config user.email "rebuild@adapte-toi.com"
          # Reset-then-recreate pattern: never conflict on concurrent timestamp writes.
          # Always re-anchors to origin/main on a real branch so push from detached HEAD impossible.
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            git fetch origin
            git checkout -B main origin/main
            mkdir -p site/public
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > site/public/.rebuild-marker
            git add site/public/.rebuild-marker
            if git diff --cached --quiet; then echo "no changes" && exit 0; fi
            git commit -m "rebuild: daily guard $(date -u +%Y-%m-%d)"
            if git push origin main; then exit 0; fi
            echo "push attempt $i failed, retrying..."
            sleep $((2 + RANDOM % 6))
          done
          echo "push failed after 5 attempts" >&2
          exit 1
      - name: Alert on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python3 blog-auto/alert_cron_failure.py "${{ github.workflow }}" "${{ github.run_id }}"
